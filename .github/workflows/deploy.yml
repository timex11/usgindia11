# ==============================================================================
#  USG India — GitHub Actions Deployment Workflow
#
#  THIS FILE AUTOMATICALLY COPIES deploy.sh TO YOUR SERVER — no manual upload!
#
#  REQUIRED SECRETS (Repo → Settings → Secrets and variables → Actions):
#    VPS_HOST          →  13.232.39.235
#    VPS_USER          →  ubuntu   (or root — check your VPS provider)
#    SSH_PRIVATE_KEY   →  Paste the FULL private key (-----BEGIN to -----END)
# ==============================================================================

name: 🚀 Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_frontend:
        description: "Skip frontend build?"
        default: "false"
        type: choice
        options: ["false", "true"]
      skip_backend:
        description: "Skip backend build?"
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: production-deployment
  cancel-in-progress: true

jobs:
  deploy:
    name: 🚢 Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout repo so we have all files including deploy.sh ────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Build deploy args ─────────────────────────────────────────
      - name: Build deploy arguments
        id: args
        run: |
          ARGS=""
          [ "${{ github.event.inputs.skip_frontend }}" = "true" ] && ARGS="$ARGS --skip-frontend"
          [ "${{ github.event.inputs.skip_backend }}"  = "true" ] && ARGS="$ARGS --skip-backend"
          ARGS="${ARGS# }"
          echo "deploy_args=${ARGS}" >> "$GITHUB_OUTPUT"
          echo "Deploy args: '${ARGS:-none}'"

      # ── Step 3: Copy deploy.sh from repo TO the server automatically ──────
      #    This fixes the "script not found" error forever.
      #    Every push syncs the latest version of deploy.sh to your VPS.
      - name: Upload deploy.sh to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     22
          source:   "scripts/deploy.sh"
          target:   "/var/www/usgindia/"
          # Creates /var/www/usgindia/scripts/deploy.sh on the server

      # ── Step 4: SSH in and run the deployment ─────────────────────────────
      - name: Run deployment via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     22
          script_stop: true
          envs: GITHUB_SHA,GITHUB_REF_NAME,GITHUB_ACTOR,GITHUB_RUN_NUMBER
          script: |
            set -euo pipefail

            DEPLOY_SCRIPT="/var/www/usgindia/scripts/deploy.sh"
            DEPLOY_ARGS="${{ steps.args.outputs.deploy_args }}"

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  USG India — Deployment"
            echo "  By     : ${GITHUB_ACTOR}"
            echo "  Branch : ${GITHUB_REF_NAME}"
            echo "  Commit : ${GITHUB_SHA:0:8}"
            echo "  Run #  : ${GITHUB_RUN_NUMBER}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # Ensure app directory exists
            mkdir -p /var/www/usgindia/scripts

            # Make executable
            chmod +x "$DEPLOY_SCRIPT"

            # Run it
            sudo bash "$DEPLOY_SCRIPT" $DEPLOY_ARGS

      # ── Success summary ───────────────────────────────────────────────────
      - name: ✅ Success summary
        if: success()
        run: |
          {
            echo "### ✅ Deployment Successful"
            echo "| | |"
            echo "|---|---|"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **By** | @${{ github.actor }} |"
            echo "| **Time** | $(date -u +'%Y-%m-%d %H:%M UTC') |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Failure summary ───────────────────────────────────────────────────
      - name: ❌ Failure summary
        if: failure()
        run: |
          {
            echo "### ❌ Deployment Failed"
            echo "| | |"
            echo "|---|---|"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **By** | @${{ github.actor }} |"
            echo ""
            echo "> SSH into your server and check:"
            echo "> \`cat /var/log/usgindia_deploy.log\`"
            echo ">"
            echo "> To rollback: \`sudo bash /var/www/usgindia/scripts/deploy.sh --rollback\`"
          } >> "$GITHUB_STEP_SUMMARY"
